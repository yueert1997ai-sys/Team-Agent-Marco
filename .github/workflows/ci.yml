name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
      - name: Install dependencies
        run: npm install
      - name: Compile TypeScript
        id: compile
        continue-on-error: true
        run: npm run build:ts 2>&1 | tee compile.log
      - name: Upload compiler diagnostics
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: typescript-diagnostics
          path: compile.log
      - name: Stop after compiler failure
        if: steps.compile.outcome == 'failure'
        run: exit 1
      - name: Copy UI assets
        run: npm run copy:ui
      - name: Run council tests
        run: node --test tests/council.test.mjs tests/final-budget.test.mjs
      - name: Run provider tests
        run: node --test tests/providers.test.mjs
      - name: Run desktop tests
        run: node --test tests/settings.test.mjs tests/ui-smoke.test.mjs tests/demo-cli.test.mjs
